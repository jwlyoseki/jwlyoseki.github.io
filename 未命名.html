<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI Light", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-weight: 300;
      letter-spacing: 0.5px;
      scroll-behavior: smooth;
    }

    :root {
      --main: #f2a2b8;
      --bg: #fffafc;
      --card: #ffffff;
      --text: #4a3b40;
      --gray: #bfa5ac;
      --shadow: 0 8px 20px -10px rgba(0,0,0,0.06);
    }

    .dark {
      --main: #f290b7;
      --bg: #1a1417;
      --card: #251b20;
      --text: #f2e3e8;
      --gray: #bfa5ac;
      --shadow: 0 8px 20px -10px rgba(0,0,0,0.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid var(--main);
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 30px;
      margin-bottom: 10px;
      font-weight: 300;
    }

    .intro {
      max-width: 700px;
      margin: 0 auto;
      color: var(--gray);
      line-height: 1.6;
      font-size: 16px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 16px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 99;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 300;
      padding: 8px 12px;
      border-radius: 8px;
    }

    nav a:hover {
      background: var(--main);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section {
      margin-bottom: 60px;
    }

    .section h2 {
      font-size: 26px;
      margin-bottom: 24px;
      color: var(--main);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 300;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .filter {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter select, .filter input {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: var(--card);
      color: var(--text);
      outline: 2px solid transparent;
    }

    .filter input:focus, .filter select:focus {
      outline-color: var(--main);
    }

    .song-count {
      margin-left: auto;
      color: var(--gray);
      font-size: 14px;
    }

    .song-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .song {
      background: var(--bg);
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid var(--main);
      cursor: pointer;
      user-select: none;
    }

    .song h4 {
      margin-bottom: 6px;
      font-weight: 400;
    }

    .song p {
      color: var(--gray);
      font-size: 14px;
    }

    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--card);
      border: none;
      color: var(--text);
      cursor: pointer;
    }

    .page-btn.active {
      background: var(--main);
      color: white;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .work {
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
    }

    .work img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .work-info {
      padding: 18px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      padding: 16px;
      border: none;
      background: var(--card);
      color: var(--text);
      resize: none;
      margin-bottom: 12px;
      font-size: 15px;
    }

    button {
      background: var(--main);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 300;
      cursor: pointer;
    }

    .msg-box {
      margin-top: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .msg {
      background: var(--bg);
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 4px solid var(--main);
    }

    #toTop {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--main);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    #toTop.show {
      opacity: 1;
      pointer-events: all;
    }

    @media (max-width: 768px) {
      .avatar { width: 140px; height: 140px; }
      header h1 { font-size: 24px; }
      .filter { flex-direction: column; align-items: stretch; }
      .song-count { margin-left: 0; text-align: center; }
    }
  </style>
</head>

    // 分页配置
    const pageSize = 20;
    let currentPage = 1;
    let filteredSongs = [...songs];

    // 统计总数
    document.getElementById('totalCount').textContent = songs.length;

    // 渲染
    function render() {
      const name = document.getElementById("searchName").value.toLowerCase();
      const singer = document.getElementById("searchSinger").value.toLowerCase();
      const lang = document.getElementById("searchLang").value;
      const style = document.getElementById("searchStyle").value;

      filteredSongs = songs.filter(s => 
        s.name.toLowerCase().includes(name) &&
        s.singer.toLowerCase().includes(singer) &&
        (lang === "" || s.lang === lang) &&
        (style === "" || s.style === style)
      );

      renderPage();
      renderPagination();
    }

    // 渲染当前页
    function renderPage() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredSongs.slice(start, end);

      document.getElementById("songList").innerHTML = pageData.map(s => `
        <div class="song" onclick="copySong('${s.name} - ${s.singer}')">
          <h4>${s.name}</h4>
          <p>${s.singer}｜${s.lang}｜${s.style}</p>
        </div>
      `).join('');
    }

    // 分页按钮
    function renderPagination() {
      const total = Math.ceil(filteredSongs.length / pageSize);
      const pag = document.getElementById("pagination");
      pag.innerHTML = "";

      for (let i=1; i<=total; i++) {
        const btn = document.createElement("button");
        btn.className = "page-btn " + (i === currentPage ? "active" : "");
        btn.textContent = i;
        btn.onclick = () => { currentPage = i; render(); };
        pag.appendChild(btn);
      }
    }

    // 复制歌名
    function copySong(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert("已复制：" + text);
      });
    }

    // 监听筛选
    document.querySelectorAll("#searchName,#searchSinger,#searchLang,#searchStyle").forEach(i => {
      i.addEventListener("input", () => { currentPage = 1; render(); });
    });

    // 留言板
    function loadMsg() {
      const msgs = JSON.parse(localStorage.getItem("msgs")) || [];
      document.getElementById("msgList").innerHTML = msgs.map(m => `<div class="msg">${m}</div>`).join('');
    }
    loadMsg();

    document.getElementById("sendBtn").addEventListener("click", () => {
      const val = document.getElementById("msgInput").value.trim();
      if (!val) return;
      const msgs = JSON.parse(localStorage.getItem("msgs")) || [];
      msgs.push(val);
      localStorage.setItem("msgs", JSON.stringify(msgs));
      document.getElementById("msgInput").value = "";
      loadMsg();
    });

    // 回到顶部
    const toTop = document.getElementById("toTop");
    window.addEventListener("scroll", () => {
      toTop.classList.toggle("show", window.scrollY > 300);
    });
    toTop.addEventListener("click", () => window.scrollTo(0, 0));

    render();
  </script>
